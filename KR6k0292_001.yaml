body:
  text: 弘一律師答問問説教時節既云十二年前略教所被云何於五年即説廣教答制與説二字不可混制即隨時制戒也説乃半月半月布薩時所説者也五年雖制廣教但佛猶自説略教也問未知僧尼廣教即全説耶抑陳其所有犯者答講義中云隨犯便結若漏未起不先制也此廣教雖五年已制但半月半月佛仍自説略教至十二年後乃重犯即以前所制而重犯者佛止不説乃令弟子説即改説廣教也問四教儀集注云經通五人律唯佛制如禮樂出自天子云何後付弟子乃廣説耶答制與説二字不同若論制戒始終唯佛能之等覺已下猶非所堪若説戒半月半月者十二年前佛自説略教十二年後因重犯戒佛止不説乃令上座持律者説之即是改説廣教也但以後制戒仍由佛制決非由弟子制問淫戒犯相表內覺境與是非道二句名義如何答覺境者有知覺之境非睡眠等非道者死形半壞已下七條皆是也或壞爛不成道形前四或是異物後三問同上表內為怨家逼云何為自入他道答為怨家逼持令自體入他人道中也是時自己無絲毫抵拒之能力問同上戒境想表內既云入道云何又生道想道疑非道想三名相答此是夜間黑暗之地或飲酒微醉之時等問表七頁南山行事鈔盜三寶物先明知事人是非是非二字是否即因果耶又並師心處分師心是否即訓為私心答是非者即是能否有資格否為知事人讀寶梁經等之文可知師心者剛愎杜撰自慢者謂之師心自用也問同上憂心念道緣境既局緣境是否指本戒少應清潔少字是否訓稍答緣境既局此四字與下文多衆務三字相對少字訓稍是也問午後每多口渴多飲茶水有多不便未知喫些冰糖有違戒律否答可爾問律唯佛制等覺已下猶非所堪而南山判四分依成實論分通大乘亦制起心若重緣者即犯突吉羅如此豈無聖凡濫制之咎耶答唯佛能制戒南山決非制戒也四分本與成實同屬空宗南山依此而判以契此土大乘之機功在萬世乞以後仁者對於南山教旨萬勿懷疑請以余已往之事為前車之鑒可耳問表七頁十四行云何謂則望十方凡聖一一結罪答常住常住物為十方凡聖所共有故云也一一結者非謂多罪但此一夷總望多境故云一一耳録靈芝記問同上行諸部五分指那五分答五分律諸部者應謂諸部中之一也問含注本七頁云何為歎譽死快勸死答讚歎譽揚稱心勸勉問表八頁第四分比丘以呪藥乃至為按腹等墮他胎波羅夷云何墮胎後母死兒活母死無犯但結方便墮胎偷蘭遮答對母決無殺心故問表六頁境想後第四分取男物作女物想取女物作男物想二條同罪為同波羅夷抑其他罪耶答滿五夷不滿五蘭問表十二頁正面靈芝資持記染意窺看念念重吉深寮坐起一一單提重吉單提二句是否為結罪意耶答是結罪重吉大淫遠方便單提第四十五獨與女人露地坐戒問表十五頁無主僧不處分過量房戒境想過量表茲擬表於下是否有訛過量想僧殘過量過量疑不過量想過量想偷蘭遮不過量不過量疑答是問表十六頁第七戒具緣成犯內第三緣資持記既云此由有主大小從他故無過量云何又制長佛六磔手廣四磔手已上房亦在具緣內耶答長六廣四已上房乃乞處分不滿此量則不須乞有主者大小從他所以決無過量之罪至乞處分則另是一事耳第七戒長六廣四之言專就應處分否而説與過量罪無有關係也因第七戒中無有過量罪問表十九頁正面罪相表內羯磨有三單白白二白四今作白竟是否為單白若是者則作白一羯磨竟乃至白三羯磨竟三條將如何配合於羯磨中若非者則作白竟為那一段文請詳細示知答僧羯磨有三此是白文一單白誦一遍此是白文二白二誦一遍此是羯磨文白與羯磨共計為二故名白二誦一遍此是白文三白四誦一遍破僧羯磨屬於白四白與羯磨此是羯磨文與前二種無涉共計為四故名白四誦三遍問懺僧殘法中直與摩那埵法與增上摩那埵法有何差別請示知答犯僧殘後當日發露向僧乞摩那埵法僧即作羯磨與法即日依行共經六日夜然後出罪此直與法也若犯僧殘後覆藏者須先依一二乞看講義然後增上與摩那埵法增上者即是後與之意也問講義內大小二字以下之小注云即三法下三品之事三品指何三品答此一句依靈芝記寫録下字稍未明白應是依法所成之事也三品即大事中事小事如疏中所明疏中指此為三品此品字不可與八品九品相混同分別觀之可也問僧集約界小注中云若戒場大界並須盡唱制限集之請詳示知答戒場有場大界四處共集如疏所明大界無場大界二處共集因説恣法通於界內外也其他羯磨當界自集不通界外上且略答後講結界法時再詳説也四處共集共集至大界因説恣法須在大界作也有難乃開戒場二處共集其他羯磨當界自集有場無場問戒場大界疏中云何謂無場大界答有場大界在後文以上大意乞轉告諸師因他人亦應懷疑也問簡衆是非四滿數中不應訶應訶不得訶亦得訶請示其差別之大意答共二種不應訶同不得訶應訶同亦得訶惟文字稍有變化其義無異也問與欲受欲説欲其意云何答與欲者即託汝傳欲受欲者即領受代為傳欲説欲者即至僧中代為説欲也問五種與欲中是否均為與欲者之言相耶答是也問五與欲中前三種其言詞將何分別方應與欲者之言相答所分五種悉依律文也前三種意同文別病重之人隨己意用一種即成就與欲不拘何種文句問自然界六相與戒場外大界內之自然界有何差別答不同戒場外之自然僅指無法之空地而言無此界字他處或作蘭若亦此意也若自然界則加一界字問現時各處叢林傳戒印有懺罪單一紙於中列某甲須禮千佛懺若干乃至念大悲呪若干遍未知此單出於何時受戒以後是否必須行持答此單出於近世受戒以後必須行持問七衆自知有犯邊罪今欲全捨戒法再乞受五八等戒未知先行懺悔後再受戒或先受戒後行懺悔答若約已犯邊罪前曾受五八十具而破前四重者今雖捨戒亦不能即受五戒八戒薩婆多論云犯邊罪者更受五戒不得若約已前受七衆戒時或境不稱心或心境俱不相應決定不能得戒者雖破四重亦可不名邊罪僅名惡業則不須捨戒以無可捨故可以先懺悔七日以上但至誠懇切懺之不必得清淨相也即自誓受三歸五戒八戒或受菩薩戒可也至於沙彌比丘戒非不可受以無師故必須禮占察懺法得清淨相已則菩薩沙彌比丘三戒同時可得也問比丘受具戒已因有難事不得已而必須犯夷罪者先捨戒已而後行之他日復欲受具戒是否為已犯邊罪答五八十具皆捨之非已犯邊罪也問對首羯磨約事亦分三品而懺次蘭衆多對首得中上品應居衆法對首之上云何列相不列小衆對首而僅收入但對首中答乞閲疏記可知問從生偷蘭即從他而生他字為指何境答初二篇大藏經會謹案答語有時但於問語旁分別批注間或須牒問詞方易了解者編時特為增入於字旁加點以示區別文中表字指四分律比丘戒相表記講義指戒本或羯磨講録
